<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TikTok OAuth Callback</title>
  </head>
  <body style="font-family: Arial, sans-serif; padding: 24px; max-width: 720px; margin: 0 auto;">
    <h2>TikTok authorization received</h2>
    <p>You can close this tab and return to the app.</p>
    <p id="details" style="color:#475569"></p>

    <script>
      const params = new URLSearchParams(window.location.search);
      const hasCode = params.has('code');
      const hasError = params.has('error');
      const state = params.get('state');

      let msg = '';
      if (hasCode) msg += 'Authorization code received. ';
      if (hasError) msg += `Error: ${params.get('error')}. `;
      if (state) msg += `State: ${state}`;
      document.getElementById('details').textContent = msg || 'No OAuth parameters found in URL.';

      console.log('TikTok OAuth callback URL:', window.location.href);
    </script>
  </body>
</html>
